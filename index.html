<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Link BEM STDIIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0A0A0A;
      --white: #FFFFFF;
      --blue: #1A56FF;
      --yellow: #F5F500;
      --red: #FF3B3B;
      --bg: #F0EFEB;
      --card-bg: #FFFFFF;
      --border: 2.5px solid #0A0A0A;
      --shadow: 4px 4px 0px #0A0A0A;
      --shadow-lg: 6px 6px 0px #0A0A0A;
    }

    body {
      background-color: var(--bg);
      color: var(--black);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    .wrapper {
      width: 100%;
      max-width: 580px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 36px;
      padding-top: 16px;
    }

    .header-badge {
      display: inline-block;
      background: var(--blue);
      color: var(--white);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 5px 14px;
      border: var(--border);
      box-shadow: 3px 3px 0 var(--black);
      margin-bottom: 14px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 8vw, 3.2rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--black);
    }

    header h1 span {
      color: var(--blue);
    }

    header p {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555;
    }

    /* ── CALLOUTS ── */
    .callouts {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 40px;
    }

    .callout {
      border: var(--border);
      padding: 18px 20px;
      position: relative;
    }

    /* Each callout has its own personality */
    .callout-info {
      background: var(--blue);
      color: var(--white);
      box-shadow: var(--shadow-lg);
    }

    .callout-guide {
      background: var(--yellow);
      color: var(--black);
      box-shadow: var(--shadow-lg);
    }

    .callout-warn {
      background: var(--red);
      color: var(--white);
      box-shadow: var(--shadow-lg);
    }

    .callout-label {
      display: inline-block;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 8px;
      margin-bottom: 10px;
      border: 2px solid currentColor;
    }

    .callout-info .callout-label {
      background: var(--yellow);
      color: var(--black);
      border-color: var(--black);
    }

    .callout-guide .callout-label {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    .callout-warn .callout-label {
      background: var(--yellow);
      color: var(--black);
      border-color: var(--black);
    }

    .callout-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .callout-msg {
      font-size: 13.5px;
      font-weight: 500;
      line-height: 1.65;
      opacity: 0.95;
    }

    /* ── SECTIONS ── */
    .sections {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .section-heading-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-num {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--black);
      color: var(--white);
      font-size: 13px;
      font-weight: 800;
      border: var(--border);
      flex-shrink: 0;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--black);
      letter-spacing: -0.01em;
    }

    .links-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--white);
      color: var(--black);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 700;
      padding: 14px 18px;
      border: var(--border);
      box-shadow: var(--shadow);
      text-decoration: none;
      transition: transform 80ms ease, box-shadow 80ms ease, background 80ms ease;
      cursor: pointer;
      letter-spacing: 0.01em;
    }

    .link-btn:hover {
      background: var(--blue);
      color: var(--white);
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0px var(--black);
    }

    .link-btn:hover .arrow {
      color: var(--yellow);
    }

    .arrow {
      font-size: 16px;
      font-weight: 900;
      flex-shrink: 0;
      margin-left: 10px;
      transition: color 80ms ease;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%;
      height: 2.5px;
      background: var(--black);
      margin: 8px 0 0;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 52px;
      text-align: center;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--black);
      border-top: var(--border);
      padding-top: 20px;
      width: 100%;
      max-width: 580px;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <header>
      <div class="header-badge">KPSDM · BEM STDIIS</div>
      <h1>Feedback<br><span>360°</span></h1>
      <p>BEM STDI Imam Syafii Jember</p>
    </header>

    <div class="callouts" id="callouts-container"></div>

    <main class="sections" id="sections-container"></main>

  </div>

  <footer>&copy; 2026 BEM STDIIS Jember. All Rights Reserved.</footer>

  <script>
    const portalData = {
      callouts: [
        {
          type: "info",
          label: "Tentang Program",
          title: "Apa itu Feedback 360?",
          message: "Metode penilaian menyeluruh dari segala arah — rekan, atasan, & diri sendiri. Tujuannya agar hasil lebih adil, objektif, dan bebas dari unsur suka/ga suka satu pihak. Kita bisa tahu gap antara cara kita melihat diri sendiri vs cara orang lain melihat kita, supaya bisa terus berkembang bareng."
        },
        {
          type: "guide",
          label: "Petunjuk Pengisian",
          title: "Mohon Isi Ketiga Form",
          message: "Tolong isi Form Horizontal (Rekan), Form Vertikal (Atasan), dan Form Refleksi Pribadi secara jujur. Gausah ditutup-tutupin. Identitas tetap aman."
        },
        {
          type: "warn",
          label: "⚠ Wajib",
          title: "Syarat Klaim Sertifikat & Rapor",
          message: "Pengisian ini wajib sebagai syarat klaim sertifikat & rapor. Tenang aja, bisa dicicil — ga harus sekaligus!"
        }
      ],
      sections: [
        {
          category: "Form Penilaian Horizontal",
          links: [
            { label: "Badan Pengurus Harian", url: "https://forms.gle/isWyDCTdtmUcfLvQA" },
            { label: "Biro Pengembangan & Penjaminan Mutu", url: "https://forms.gle/UfteLpwtKuAb1gLq8" },
            { label: "Biro Administrasi", url: "https://forms.gle/xvM1o8Kvg6hwAW3p9" },
            { label: "Biro Pengelolaan Keuangan", url: "https://forms.gle/eJ7U8fFQcX9ToUoZ8" },
            { label: "Biro Inovasi Keuangan", url: "https://forms.gle/cHSej2aAKwPKVVsY6" },
            { label: "Kementerian Akademik & Pengembangan Karier", url: "https://forms.gle/a1nDGNn6vXXBCwn46" },
            { label: "Kementerian Kaderisasi & PSDM", url: "https://forms.gle/ojVEjY2KRH2zuGve8" },
            { label: "Kementerian Pemuda & Olahraga", url: "https://forms.gle/uRXqXJBXEKdMLNQU9" },
            { label: "Kementerian Pengembangan Bahasa", url: "https://forms.gle/ocmP3MSLjiCs6RkH6" },
            { label: "Kementerian Hubungan Eksternal", url: "https://forms.gle/LPUpfMrTHSUMwetW8" },
            { label: "Kementerian Advokasi & Kesejahteraan Mahasiswa", url: "https://forms.gle/dRLyJYQnUqc8Lzhj6" },
            { label: "Kementerian Harmonisasi Kampus", url: "https://forms.gle/T1bheCjW3QsVvndb9" },
            { label: "Biro Desain Komunikasi Visual", url: "https://forms.gle/kYeNFbBwTnGeACXK7" }
          ]
        },
        {
          category: "Form Penilaian Vertikal",
          links: [
            { label: "Anggota untuk Menteri & BPH", url: "https://forms.gle/MYt7zLTkwfcFi9DLA" },
            { label: "Menteri untuk BPH", url: "https://forms.gle/u6ZxwMATfj31h4zS7" }
          ]
        },
        {
          category: "Form Refleksi Pribadi",
          links: [
            { label: "Isi Sekarang", url: "https://forms.gle/XLZMAdPFZZFQfW659" }
          ]
        }
      ]
    };

    // Render callouts
    const calloutsEl = document.getElementById('callouts-container');
    portalData.callouts.forEach(c => {
      calloutsEl.innerHTML += `
        <div class="callout callout-${c.type}">
          <div class="callout-label">${c.label}</div>
          <div class="callout-title">${c.title}</div>
          <p class="callout-msg">${c.message}</p>
        </div>
      `;
    });

    // Render sections
    const sectionsEl = document.getElementById('sections-container');
    portalData.sections.forEach((section, i) => {
      const sec = document.createElement('div');
      sec.className = 'section';

      sec.innerHTML = `
        <div class="section-heading-wrap">
          <div class="section-num">${String(i + 1).padStart(2, '0')}</div>
          <div>
            <div class="section-title">${section.category}</div>
            <div class="divider"></div>
          </div>
        </div>
        <div class="links-grid">
          ${section.links.map(link => `
            <a href="${link.url}" target="_blank" rel="noopener noreferrer" class="link-btn">
              <span>${link.label}</span>
              <span class="arrow">→</span>
            </a>
          `).join('')}
        </div>
      `;

      sectionsEl.appendChild(sec);
    });
  </script>
</body>
</html>
